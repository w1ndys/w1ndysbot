services:
  w1ndysbot:
    image: ${BOT_IMAGE:-w1ndysbot:latest}
    container_name: w1ndysbot
    restart: unless-stopped
    env_file:
      - /opt/w1ndysbot/app/.env
    # 明确声明东八区（Asia/Shanghai）时区环境，避免容器默认 UTC 导致
    # 模块内基于 datetime.now() 的定时/日志时间出现 8 小时偏差。
    environment:
      WS_URL: ws://napcat:3001
      TZ: Asia/Shanghai
    networks:
      - w1ndysbot
    volumes:
      - /opt/w1ndysbot/app/data:/app/data
      - /opt/w1ndysbot/app/logs:/app/logs

  napcat:
    image: ${NAPCAT_IMAGE:-mlikiowa/napcat-docker:latest}
    container_name: napcat
    restart: unless-stopped
    # 同步声明东八区时区，保持整套服务时间基准一致。
    environment:
      TZ: Asia/Shanghai
    networks:
      - w1ndysbot
    ports:
      - "6099:6099"
    volumes:
      - /opt/napcat:/app/napcat

networks:
  w1ndysbot:
    name: w1ndysbot
